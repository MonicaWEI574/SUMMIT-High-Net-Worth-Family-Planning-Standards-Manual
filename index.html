<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUMMIT 高淨值家族規劃標準手冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        summit: {
                            dark: '#0f172a',
                            gold: '#D4AF37',
                            lightgold: '#F3E5AB',
                            gray: '#f8fafc',
                            text: '#334155'
                        }
                    },
                    fontFamily: {
                        serif: ['"Noto Serif TC"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            overflow: hidden;
            font-family: 'Noto Serif TC', serif;
            color: #334155;
        }

        /* 雙模式切換核心：透過 JS 判斷比例並附加 class 於 body */
        .mobile-mode #scene { display: none !important; }
        .mobile-mode #mobile-view { display: block !important; }

        .desktop-mode #scene { display: flex !important; }
        .desktop-mode #mobile-view { display: none !important; }

        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.6); }

        /* ================= 桌面端：3D 書本樣式 ================= */
        #scene {
            width: 100vw;
            height: 100vh;
            display: flex; /* 會被 body class 覆寫 */
            justify-content: center;
            align-items: center;
            perspective: 2500px;
            overflow: hidden;
        }

        #book {
            position: relative;
            width: 1200px; 
            height: 800px; 
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .sheet {
            position: absolute;
            width: 50%;
            height: 100%;
            top: 0;
            right: 0;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            backface-visibility: hidden;
            background-color: #fcfaf5;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
            overflow: hidden;
        }

        .face.front {
            transform: rotateY(0deg);
            border-radius: 0 8px 8px 0;
            background-image: linear-gradient(to right, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 5%), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" opacity="0.05"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23n)"/></svg>');
        }

        .face.back {
            transform: rotateY(180deg);
            border-radius: 8px 0 0 8px;
            background-image: linear-gradient(to left, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 5%), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" opacity="0.05"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23n)"/></svg>');
        }

        .cover {
            background-color: #1e293b;
            background-image: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #D4AF37;
            border: 2px solid #D4AF37;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.5);
        }
        .face.front.cover { border-left: none; }
        .face.back.cover { border-right: none; }
        .sheet.flipped { transform: rotateY(-180deg); }

        .page-content {
            padding: 50px 70px; 
            height: 100%;
            overflow-y: auto;
            box-sizing: border-box;
            position: relative;
            font-size: 1.15rem; 
            line-height: 1.8;
        }
        .page-content::-webkit-scrollbar { display: none; }
        .page-content { -ms-overflow-style: none; scrollbar-width: none; }

        .page-content .text-xs { font-size: 0.95rem; line-height: 1.4; }
        .page-content .text-sm { font-size: 1.05rem; line-height: 1.6; }
        .page-content .text-base { font-size: 1.15rem; line-height: 1.8; }
        .page-content .text-lg { font-size: 1.35rem; line-height: 1.8; }
        .page-content .text-xl { font-size: 1.5rem; line-height: 1.4; }
        .page-content .text-2xl { font-size: 1.8rem; line-height: 1.3; }
        .page-content .text-3xl { font-size: 2.2rem; line-height: 1.2; }
        
        .page-content p, .page-content li { margin-bottom: 0.75rem; }
        .page-content h2 { margin-bottom: 1.5rem; }
        .page-content h4 { font-size: 1.25rem; margin-bottom: 0.5rem; }

        .cover-content { width: 100%; height: 100%; font-size: 1.2rem; }
        .cover-content .text-xs { font-size: 1rem; }
        .cover-content .text-sm { font-size: 1.1rem; }
        .cover-content .text-lg { font-size: 1.5rem; }
        .cover-content .text-3xl { font-size: 2.5rem; }

        .page-number {
            position: absolute;
            bottom: 25px;
            font-size: 1rem;
            color: #94a3b8;
        }
        .face.front .page-number { right: 70px; }
        .face.back .page-number { left: 70px; }

        /* ================= 行動端/直屏：卡片樣式 ================= */
        .mobile-card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            scroll-margin-top: 80px; 
        }
        .mobile-card-cover {
            background-color: #0f172a;
            background-image: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #D4AF37;
            border: 1px solid #D4AF37;
        }
        .mobile-page-inner {
            padding: 32px 28px; 
            line-height: 1.6;
            color: #334155;
        }
        .mobile-page-inner .text-xs { font-size: 0.85rem; }
        .mobile-page-inner .text-sm { font-size: 0.95rem; }
        .mobile-page-inner .text-base { font-size: 1rem; }
        .mobile-page-inner .text-lg { font-size: 1.1rem; }
        .mobile-page-inner .text-xl { font-size: 1.25rem; }
        .mobile-page-inner .text-2xl { font-size: 1.4rem; }
        .mobile-page-inner .text-3xl { font-size: 1.6rem; }
        .mobile-page-inner .text-4xl { font-size: 1.8rem; }
        .mobile-page-inner h2 { margin-bottom: 1rem; }
        .mobile-page-inner h4 { margin-bottom: 0.5rem; }
        .mobile-page-inner p, .mobile-page-inner li { margin-bottom: 0.75rem; }

        /* ================= 共用互動元素 ================= */
        .term-link {
            color: #b45309;
            border-bottom: 1px dashed #b45309;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .term-link:hover { background-color: rgba(180, 83, 9, 0.1); }
        
        .case-btn {
            display: inline-flex;
            align-items: center;
            background-color: #fef3c7;
            color: #92400e;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #fcd34d;
            margin-top: 12px;
        }
        .case-btn:hover { background-color: #fde68a; transform: translateY(-1px); }

        #sidebar {
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            max-width: 320px;
        }
        #sidebar.open { transform: translateX(0); }

        #modal-backdrop {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #modal-backdrop.active { opacity: 1; pointer-events: auto; }
        #modal-content {
            transform: scale(0.95) translateY(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #modal-backdrop.active #modal-content { transform: scale(1) translateY(0); }
        .highlight { background-color: rgba(212, 175, 55, 0.4); border-radius: 2px; }

        @media (max-width: 768px) {
            #sidebar { width: 85vw; }
        }
    </style>
</head>
<body class="antialiased flex h-screen w-screen overflow-hidden desktop-mode">

    <audio id="flip-sound" src="https://assets.mixkit.co/active_storage/sfx/2092/2092-preview.mp3" preload="auto"></audio>

    <!-- 頂部導航/工具欄 -->
    <header class="fixed top-0 left-0 right-0 h-16 bg-summit-dark/80 backdrop-blur-md border-b border-summit-gold/20 z-40 flex items-center justify-between px-4 sm:px-6 shadow-lg">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-summit-gold hover:text-white transition p-2 rounded-lg hover:bg-white/10">
                <i data-lucide="menu"></i>
            </button>
            <h1 class="text-summit-gold font-serif text-lg sm:text-xl font-bold tracking-wider hidden sm:block">SUMMIT 家族規劃手冊</h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="relative hidden sm:block">
                <input type="text" id="searchInput" placeholder="搜索章節或關鍵字..." class="bg-slate-800 text-sm text-white border border-slate-600 rounded-full pl-10 pr-4 py-1.5 focus:outline-none focus:border-summit-gold w-64">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
            </div>
            
            <button onclick="openAddCaseModal()" class="text-slate-400 hover:text-summit-gold transition p-2" title="添加新案例">
                <i data-lucide="file-plus-2"></i>
            </button>

            <button onclick="toggleSound()" id="soundBtn" class="text-slate-400 hover:text-summit-gold transition p-2">
                <i data-lucide="volume-2"></i>
            </button>
        </div>
    </header>

    <!-- 側邊目錄欄 -->
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 bg-slate-900 border-r border-slate-700 z-50 shadow-2xl flex flex-col pt-16">
        <div class="p-6 flex-1 overflow-y-auto">
            <h2 class="text-summit-gold text-lg font-bold mb-6 flex items-center gap-2">
                <i data-lucide="list"></i> 完整目錄
            </h2>
            <nav id="toc-container" class="space-y-1 text-sm text-slate-300">
                <!-- 目錄將由 JS 動態生成 -->
            </nav>
        </div>
        <div class="p-4 border-t border-slate-700">
            <button onclick="toggleSidebar()" class="w-full py-2 bg-slate-800 hover:bg-slate-700 text-white rounded transition flex justify-center items-center gap-2">
                <i data-lucide="x" class="w-4 h-4"></i> 關閉目錄
            </button>
        </div>
    </aside>

    <!-- 桌面端主視覺區：3D 書本 -->
    <main id="scene">
        <div id="book">
            <!-- 書頁將由 JS 動態生成 -->
        </div>
    </main>

    <!-- 行動端主視覺區：優雅的卡片式連續滾動 -->
    <main id="mobile-view" class="w-full h-full pt-20 pb-28 px-4 overflow-y-auto bg-slate-100 scroll-smooth relative">
        <div id="mobile-pages-container" class="flex flex-col w-full max-w-2xl mx-auto">
            <!-- 手機版頁面將由 JS 動態生成 -->
        </div>
    </main>

    <!-- 底部控制欄 -->
    <footer class="fixed bottom-0 left-0 right-0 bg-summit-dark/90 backdrop-blur-md border-t border-summit-gold/20 z-40 p-3 sm:p-4 flex items-center justify-center sm:justify-between flex-wrap gap-4 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        <div class="flex items-center gap-2 sm:gap-4">
            <button onclick="goToPage(0)" class="text-slate-400 hover:text-summit-gold p-2" title="回封面"><i data-lucide="chevrons-left"></i></button>
            <button onclick="prevPage()" class="bg-slate-800 hover:bg-slate-700 text-summit-gold border border-summit-gold/30 px-4 py-2 rounded flex items-center gap-2 transition"><i data-lucide="chevron-left" class="w-4 h-4"></i> 上一頁</button>
            <button onclick="nextPage()" class="bg-summit-gold hover:bg-yellow-500 text-slate-900 font-bold px-4 py-2 rounded flex items-center gap-2 transition">下一頁 <i data-lucide="chevron-right" class="w-4 h-4"></i></button>
            <button onclick="goToPage(totalPages - 1)" class="text-slate-400 hover:text-summit-gold p-2" title="至封底"><i data-lucide="chevrons-right"></i></button>
        </div>
        <div class="flex items-center gap-4 w-full sm:w-auto">
            <span class="text-slate-400 text-sm hidden sm:inline whitespace-nowrap" id="page-indicator">進度: 0%</span>
            <input type="range" id="progress-slider" min="0" max="100" value="0" class="w-full sm:w-48 h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-summit-gold">
        </div>
    </footer>

    <!-- 案例展示模態框 -->
    <div id="modal-backdrop" class="fixed inset-0 bg-black/80 z-[100] flex justify-center items-center p-4 backdrop-blur-sm" onclick="closeModal(event)">
        <div id="modal-content" class="bg-white rounded-xl shadow-2xl max-w-lg w-full overflow-hidden relative" onclick="event.stopPropagation()">
            <div class="bg-slate-900 p-4 flex justify-between items-center border-b border-summit-gold/30">
                <h3 id="modal-title" class="text-summit-gold font-bold text-lg font-serif">標題</h3>
                <button onclick="hideModal()" class="text-slate-400 hover:text-white transition"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" class="p-6 text-slate-700 leading-relaxed font-serif text-base max-h-[70vh] overflow-y-auto">
                內容
            </div>
        </div>
    </div>

    <!-- 升級：AI 智能導入新案例表單模態框 -->
    <div id="add-case-backdrop" class="fixed inset-0 bg-black/80 z-[110] flex justify-center items-center p-4 backdrop-blur-sm" style="opacity: 0; pointer-events: none; transition: opacity 0.3s ease;" onclick="closeAddCaseModal(event)">
        <div id="add-case-content" class="bg-white rounded-xl shadow-2xl max-w-lg w-full overflow-hidden relative" style="transform: scale(0.95) translateY(10px); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);" onclick="event.stopPropagation()">
            <div class="bg-slate-900 p-4 flex justify-between items-center border-b border-summit-gold/30">
                <h3 class="text-summit-gold font-bold text-lg font-serif flex items-center gap-2"><i data-lucide="sparkles" class="w-5 h-5"></i> AI 智能導入案例</h3>
                <button onclick="closeAddCaseModal(event)" class="text-slate-400 hover:text-white transition" id="close-modal-btn"><i data-lucide="x"></i></button>
            </div>
            <form onsubmit="submitAddCaseAI(event)" class="p-6 text-slate-700 max-h-[75vh] overflow-y-auto flex flex-col gap-4">
                <div class="bg-blue-50 border border-blue-100 p-4 rounded-lg flex gap-3 text-sm text-blue-800">
                    <i data-lucide="info" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
                    <p>只需貼上原始案例文本，AI 將自動為您<strong>提煉標題、分配編號、排版格式</strong>，並智慧判斷該歸屬於哪一章節（或自動為其建立新頁）。</p>
                </div>
                
                <div class="flex-1">
                    <textarea id="raw-case-content" rows="10" placeholder="在此貼上客戶背景、痛點、解決方案等原始文字..." required class="w-full h-full min-h-[200px] border border-slate-300 rounded-lg p-4 focus:outline-none focus:border-summit-gold focus:ring-1 focus:ring-summit-gold resize-none leading-relaxed"></textarea>
                </div>
                
                <div class="pt-2 flex justify-end gap-3 border-t border-slate-100 mt-2">
                    <button type="button" onclick="closeAddCaseModal(event)" class="px-4 py-2 text-sm text-slate-500 hover:bg-slate-100 rounded transition font-bold" id="cancel-btn">取消</button>
                    <button type="submit" id="ai-submit-btn" class="px-5 py-2 text-sm bg-summit-gold text-slate-900 font-bold rounded hover:bg-yellow-500 transition shadow-md flex items-center gap-2">
                        <i data-lucide="wand-2" class="w-4 h-4"></i> <span id="btn-text">AI 智能分析並寫入</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 知識庫與案例數據
        const knowledgeBase = {
            "A類：企業操盤型": "指以企業經營和資本運作為核心的高淨值客戶。這類客戶通常面臨企業經營風險與個人/家族資產混同的痛點，需要強大的風險隔離與資本化升級方案。",
            "家族信託": "一種財富管理架構，委託人將財產所有權轉移給受託人，由受託人按信託契約為指定受益人的利益進行管理和處分，具有資產隔離、稅務籌劃與定向傳承的功能。",
            "家族憲章": "家族成員共同制定並遵守的『家族根本大法』，規範家族價值觀、家族企業治理規則、成員權利義務及衝突解決機制。",
            "CRS": "共同申報準則 (Common Reporting Standard)，用於指導參與管轄區定期交換稅務居民財務帳戶信息的全球標準，對高淨值人士的跨境資產透明度產生重大影響。",
            "SPV": "特殊目的實體 (Special Purpose Vehicle)，為特定業務目的或項目設立的法律實體，常應用於跨境投資架構與風險隔離設計中。"
        };

        const caseStudies = {
            "案例A1": { title: "案例A1：山東不良資產操盤手的跨境升級", content: "<p class='mb-3'><strong>客戶背景：</strong>陳總，山東資深不良資產投資人，常年將大量高風險不良資產掛在個人或親屬名下，面臨極大的個人連帶負債風險與稅務隱患。</p><p class='mb-3'><strong>核心痛點：</strong>項目依賴性強，缺乏系統性平台；個人與企業風險高度混同。</p><p><strong>解決方案：</strong><br>1. 設立香港控股平台作為頂層架構。<br>2. 協助將內地分散的不良資產打包，發行私募特殊機會基金（母基金模式）。<br>3. 建立 WFOE 進行境內業務控制。<br>4. 為其家族設立離岸信託，將家族安全資金與高風險業務徹底隔離，成功實現從『個人操盤』到『機構化資本平台』的升級。</p>" },

            const systemPrompt = `你是一個資深的家族財富規劃架構師。
請分析使用者提供的案例內容，進行提煉與分類，並嚴格以 JSON 格式返回。

- title: 提煉出一個精煉的案例標題，不要包含編號。
- content: 將內容美化排版為 HTML 格式，適當使用 <p class='mb-3'> 和 <strong> 標籤來區分「客戶背景」、「核心痛點」、「解決方案」等段落。
- target: 判斷這個案例最適合歸類到哪一章節的末尾。請從以下 index 選擇最合適的一個（返回字串數字），如果都不合適，返回 "new" 代表新開一頁。
可選的 index 映射表：
"8" = 第3章 A類：企業操盤型

"13" = 第7-8章 法律稅務與金融工具
"new" = 其他完全無法歸類的案例`;

            // 移除已下架的舊版模型，並將支援的最新模型依序排列
            const modelsToTry = [
                "gemini-2.5-flash-preview-09-2025",
                "gemini-2.0-flash",
                "gemini-1.5-flash"
            ];

            let lastErrorMsg = "";

            for (const model of modelsToTry) {
                try {
                    const payload = {
                        contents: [{ parts: [{ text: text }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    id: { type: "STRING" },
                                    title: { type: "STRING" },
                                    content: { type: "STRING" },
                                    target: { type: "STRING" }
                                },
                                required: ["id", "title", "content", "target"]
                            }
                        }
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        const errMsg = errorData.error?.message || `HTTP 狀態碼 ${response.status}`;
                        
                        if (response.status === 404) {
                            console.warn(`[自動降級] 模型 ${model} 不存在，嘗試下一個...`);
                            lastErrorMsg = `模型 ${model} 不存在`;
                            continue; // 只有 404 (找不到該版本) 才允許繼續測試下一個模型
                        }
                        
                        // 🚨 關鍵修復：如果是 400 或 403，代表 API 連線成功但被拒絕，立刻中斷並報錯，不再往下掩蓋！
                        throw new Error(`Google API 拒絕請求 (${response.status}): ${errMsg}`);
                    }

                    const data = await response.json();
                    let resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (resultText) {
                        // 強制淨化 AI 返回的字串，抓取最外層的 { } 避免 JSON 解析崩潰
                        resultText = resultText.replace(/^```json/mi, '').replace(/```/g, '').trim();
                        const firstBrace = resultText.indexOf('{');
                        const lastBrace = resultText.lastIndexOf('}');
                        if (firstBrace !== -1 && lastBrace !== -1) {
                            resultText = resultText.substring(firstBrace, lastBrace + 1);
                        }
                        return JSON.parse(resultText); 
                    }
                } catch (error) {
                    console.warn(`模型 ${model} 連線異常:`, error);
                    
                    if (error.name === 'TypeError' && error.message.includes('Failed to fetch')) {
                        throw new Error("網路連線失敗 (Failed to fetch)。\n👉 瀏覽器無法連線至 Google 伺服器，請確認您的 VPN 已確實開啟「全局代理 (Global Proxy)」。");
                    } 
                    
                    // 如果是 API 直接拒絕，把真實的錯誤拋出去給使用者看，直接打破迴圈
                    if (error.message.includes('Google API 拒絕請求')) {
                        throw error;
                    }

                    lastErrorMsg = error.message;
                    break; // 其他解析錯誤也直接中斷
                }
            }
            
            throw new Error(lastErrorMsg);
        }

        }

        function updateBookTransform() {
            if (isMobileMode()) return; 

            const targetSheet = Math.floor((currentPage + 1) / 2);
            let didFlip = false;
            if (targetSheet !== lastFlippedSheet) {
                didFlip = true;
                lastFlippedSheet = targetSheet;
            }

            const sheets = document.querySelectorAll('.sheet');
            sheets.forEach((sheet, index) => {
                if (index < targetSheet) {
                    sheet.classList.add('flipped');
                    sheet.style.zIndex = index;
                } else {
                    sheet.classList.remove('flipped');
                    sheet.style.zIndex = totalSheets - index;
                }
            });

            let translateX = 0;
            if (currentPage === 0) {
                translateX = -25;
            } else if (currentPage === totalPages - 1) {
                translateX = (totalPages % 2 === 0) ? 25 : -25;
            } else {
                translateX = 0;
            }

            const bookEl = document.getElementById('book');
            if(bookEl) {
                bookEl.style.transform = `scale(${currentScale}) translateX(${translateX}%)`;
            }

            updateUI();
            if (didFlip) playFlipSound();
            try { localStorage.setItem('summitBookProgressPage', currentPage); } catch(e){}
        }

        function scaleBook() {
            if (isMobileMode()) return; 
            
            const availableWidth = window.innerWidth * 0.95; 
            const availableHeight = window.innerHeight - 140;

            const effectiveBookWidth = 1200; 
            const bookHeight = 800;

            const scaleX = availableWidth / effectiveBookWidth;
            const scaleY = availableHeight / bookHeight;
            
            // 加入安全範圍，避免縮放比例變成異常負數或 NaN 導致不可見
            currentScale = Math.max(Math.min(scaleX, scaleY), 0.1); 

            updateBookTransform();
        }

        function buildTOC() {
            const tocNav = document.getElementById('toc-container');
            let tocHTML = '';
            
            bookData.forEach((page, index) => {
                if (page.title && page.type !== 'cover' && !page.isTOC) {
                    tocHTML += `
                        <button onclick="goToPage(${index}); toggleSidebar();" class="toc-item w-full text-left py-2 px-3 rounded hover:bg-slate-800 transition flex justify-between items-center group">
                            <span class="group-hover:text-summit-gold transition-colors text-base">${page.title}</span>
                            <span class="text-sm text-slate-500">P.${index}</span>
                        </button>
                    `;
                }
            });
            if(tocNav) tocNav.innerHTML = tocHTML;

            const inBookTOCs = document.querySelectorAll('.page-toc-content-placeholder');
            if(inBookTOCs.length > 0) {
                let innerTOC = '<ul class="space-y-4">';
                bookData.forEach((page, index) => {
                    if (page.title && page.type !== 'cover' && !page.isTOC) {
                        innerTOC += `
                            <li class="toc-link flex justify-between items-center border-b border-slate-200 pb-3 cursor-pointer hover:text-summit-gold transition" onclick="event.stopPropagation(); goToPage(${index})">
                                <span class="font-bold text-lg">${page.title}</span>
                                <span class="text-slate-400">${index}</span>
                            </li>
                        `;
                    }
                });
                innerTOC += '</ul>';
                inBookTOCs.forEach(el => el.innerHTML = innerTOC);
            }
        }

        function updateUI() {
            const percentage = Math.round((currentPage / (totalPages - 1)) * 100);
            const pageIndicator = document.getElementById('page-indicator');
            if(pageIndicator) pageIndicator.textContent = `閱讀進度: ${percentage}%`;
            const progressSlider = document.getElementById('progress-slider');
            if(progressSlider) progressSlider.value = percentage;
        }

        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.toc-item');
            if(query.trim() !== '') {
                if(!document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
            }
            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                if (text.includes(query)) {
                    item.style.display = 'flex';
                    if(query.length > 0) {
                        const regex = new RegExp(`(${query})`, "gi");
                        item.querySelector('span').innerHTML = item.querySelector('span').textContent.replace(regex, "<span class='highlight'>$1</span>");
                    } else {
                        item.querySelector('span').innerHTML = item.querySelector('span').textContent;
                    }
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function toggleSidebar() { 
            const sb = document.getElementById('sidebar');
            if(sb) sb.classList.toggle('open'); 
        }

        function handleTermClick(term) {
            if(knowledgeBase[term]) showModal(`名詞解釋：${term}`, `<p>${knowledgeBase[term]}</p>`);
        }
        function handleCaseClick(caseId) {
            if(caseStudies[caseId]) showModal(caseStudies[caseId].title, caseStudies[caseId].content);
        }
        function showModal(title, body) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').innerHTML = body;
            document.getElementById('modal-backdrop').classList.add('active');
        }
        function hideModal() { 
            const backdrop = document.getElementById('modal-backdrop');
            if(backdrop) backdrop.classList.remove('active'); 
        }
        function closeModal(e) { if (e.target.id === 'modal-backdrop') hideModal(); }

        let soundEnabled = true;
        const flipSound = document.getElementById('flip-sound');
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const icon = document.querySelector('#soundBtn i');
            if(icon) {
                icon.setAttribute('data-lucide', soundEnabled ? 'volume-2' : 'volume-x');
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }
        }
        function playFlipSound() {
            if (soundEnabled && flipSound) {
                flipSound.currentTime = 0;
                flipSound.volume = 0.3;
                flipSound.play().catch(e => {});
            }
        }

        // ====== 啟動時先做環境判斷 ======
        window.onload = () => {
            checkDeviceMode();
            initBook();
        };
    </script>
</body>
</html>
