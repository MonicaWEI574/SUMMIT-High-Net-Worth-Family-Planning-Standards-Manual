<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUMMIT 高淨值家族規劃標準手冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        summit: {
                            dark: '#0f172a',
                            gold: '#D4AF37',
                            lightgold: '#F3E5AB',
                            gray: '#f8fafc',
                            text: '#334155'
                        }
                    },
                    fontFamily: {
                        serif: ['"Noto Serif TC"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            overflow: hidden;
            font-family: 'Noto Serif TC', serif;
            color: #334155;
            touch-action: pan-y; /* 防止行動端意外雙擊縮放 */
        }

        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.6); }

        /* 書籍 3D 容器 */
        #scene {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2500px; /* 加深視角，讓翻轉更自然 */
            overflow: hidden;
        }

        #book {
            position: relative;
            width: 1200px; 
            height: 800px; 
            transform-style: preserve-3d;
            /* 與翻頁動畫保持相同的節奏，讓鏡頭平移如絲般順滑 */
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        /* 單張紙 (包含正反兩面) */
        .sheet {
            position: absolute;
            width: 50%;
            height: 100%;
            top: 0;
            right: 0;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
        }

        /* 紙張的面 */
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            backface-visibility: hidden;
            background-color: #fcfaf5;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
            overflow: hidden;
        }

        .face.front {
            transform: rotateY(0deg);
            border-radius: 0 8px 8px 0;
            background-image: linear-gradient(to right, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 5%), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" opacity="0.05"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23n)"/></svg>');
        }

        .face.back {
            transform: rotateY(180deg);
            border-radius: 8px 0 0 8px;
            background-image: linear-gradient(to left, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 5%), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" opacity="0.05"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23n)"/></svg>');
        }

        /* 封面/封底特殊樣式 */
        .cover {
            background-color: #1e293b;
            background-image: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #D4AF37;
            border: 2px solid #D4AF37;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.5);
        }
        .face.front.cover { border-left: none; }
        .face.back.cover { border-right: none; }

        /* 書頁翻動狀態 */
        .sheet.flipped {
            transform: rotateY(-180deg);
        }

        /* ----- 響應式字體與排版覆蓋 ----- */
        /* 透過放大內頁的基礎字體，確保縮放至手機時依然具備高辨識度 */
        .page-content {
            padding: 50px 70px; 
            height: 100%;
            overflow-y: auto;
            box-sizing: border-box;
            position: relative;
            font-size: 1.15rem; /* 基礎字號放大 */
            line-height: 1.8;
        }
        .page-content::-webkit-scrollbar { display: none; }
        .page-content { -ms-overflow-style: none; scrollbar-width: none; }

        /* 自動接管 Tailwind 的絕對大小，改為相對適應 */
        .page-content .text-xs { font-size: 0.95rem; line-height: 1.4; }
        .page-content .text-sm { font-size: 1.05rem; line-height: 1.6; }
        .page-content .text-base { font-size: 1.15rem; line-height: 1.8; }
        .page-content .text-lg { font-size: 1.35rem; line-height: 1.8; }
        .page-content .text-xl { font-size: 1.5rem; line-height: 1.4; }
        .page-content .text-2xl { font-size: 1.8rem; line-height: 1.3; }
        .page-content .text-3xl { font-size: 2.2rem; line-height: 1.2; }
        
        .page-content p, .page-content li { margin-bottom: 0.75rem; }
        .page-content h2 { margin-bottom: 1.5rem; }
        .page-content h4 { font-size: 1.25rem; margin-bottom: 0.5rem; }

        /* 封面獨立控制 */
        .cover-content { width: 100%; height: 100%; font-size: 1.2rem; }
        .cover-content .text-xs { font-size: 1rem; }
        .cover-content .text-sm { font-size: 1.1rem; }
        .cover-content .text-lg { font-size: 1.5rem; }
        .cover-content .text-3xl { font-size: 2.5rem; }

        /* 互動元素 */
        .term-link {
            color: #b45309;
            border-bottom: 1px dashed #b45309;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .term-link:hover { background-color: rgba(180, 83, 9, 0.1); }
        
        .case-btn {
            display: inline-flex;
            align-items: center;
            background-color: #fef3c7;
            color: #92400e;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #fcd34d;
            margin-top: 12px;
        }
        .case-btn:hover { background-color: #fde68a; transform: translateY(-1px); }

        .page-number {
            position: absolute;
            bottom: 25px;
            font-size: 1rem;
            color: #94a3b8;
        }
        .face.front .page-number { right: 70px; }
        .face.back .page-number { left: 70px; }

        /* 側邊導航欄 */
        #sidebar {
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            max-width: 320px;
        }
        #sidebar.open { transform: translateX(0); }

        /* 模態框動畫 */
        #modal-backdrop {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #modal-backdrop.active { opacity: 1; pointer-events: auto; }
        #modal-content {
            transform: scale(0.95) translateY(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #modal-backdrop.active #modal-content { transform: scale(1) translateY(0); }
        .highlight { background-color: rgba(212, 175, 55, 0.4); border-radius: 2px; }

        @media (max-width: 768px) {
            #sidebar { width: 85vw; }
        }
    </style>
</head>

            <button onclick="goToPage(totalPages - 1)" class="text-slate-400 hover:text-summit-gold p-2" title="至封底"><i data-lucide="chevrons-right"></i></button>

    <script>

                sheet.className = 'sheet';
                sheet.style.zIndex = totalSheets - i;
                // 點擊事件統管
                sheet.onclick = (e) => handlePageClick(e);

                const fIdx = i * 2;
                const bIdx = i * 2 + 1;

                const frontHTML = buildPageContent(fIdx);
                const backHTML = buildPageContent(bIdx, true);

                let coverClassesFront = fIdx === 0 ? 'cover' : '';
                let coverClassesBack = bIdx === totalPages - 1 ? 'cover' : '';

                sheet.innerHTML = `
                    <div class="face front ${coverClassesFront}">
                        ${frontHTML}
                    </div>
                    <div class="face back ${coverClassesBack}">
                        ${backHTML}
                    </div>
                `;
                bookEl.appendChild(sheet);
            }

            buildTOC();
            // 先計算縮放尺寸，再應用變換
            scaleBook();
            lucide.createIcons();
            
            document.addEventListener('keydown', (e) => {
                if(e.key === 'ArrowRight') nextPage();
                if(e.key === 'ArrowLeft') prevPage();
            });

            document.getElementById('progress-slider').addEventListener('input', (e) => {
                const val = parseInt(e.target.value);
                const targetPage = Math.round((val / 100) * (totalPages - 1));
                goToPage(targetPage);
            });

            document.getElementById('searchInput').addEventListener('input', handleSearch);
            window.addEventListener('resize', scaleBook);
        }

        function buildPageContent(index) {
            if (index >= totalPages) return '<div class="page-content"></div>';
            const data = bookData[index];
            if (data.type === 'cover') return data.html;

            let content = `<div class="page-content">`;
            content += data.html;
            
            if (index > 0 && index < totalPages - 1) {
                content += `<div class="page-number">- ${index} -</div>`;
            }
            content += `</div>`;
            return content;
        }

        // 智慧點擊邏輯：點擊螢幕左側回退，點擊右側前進
        function handlePageClick(e) {
            if(e.target.closest('.term-link') || e.target.closest('.case-btn') || e.target.closest('button')) return;
            const rect = document.getElementById('scene').getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            if (clickX > rect.width / 2) {
                nextPage();
            } else {
                prevPage();
            }
        }

        // 電腦版翻過一個Spread(2頁)，手機版聚焦翻過1頁
        function nextPage() {
            const isMobile = window.innerWidth < 768;
            const increment = isMobile ? 1 : 2;
            if (currentPage + increment < totalPages) {
                currentPage += increment;
            } else {
                currentPage = totalPages - 1;
            }
            updateBookTransform();
        }

        function prevPage() {
            const isMobile = window.innerWidth < 768;
            const decrement = isMobile ? 1 : 2;
            if (currentPage - decrement >= 0) {
                currentPage -= decrement;
            } else {
                currentPage = 0;
            }
            updateBookTransform();
        }

        function goToPage(pageIndex) {
            if (pageIndex >= 0 && pageIndex < totalPages) {
                currentPage = pageIndex;
                updateBookTransform();
            }
        }

        // 動態計算當前需要翻開的實體紙張 (Sheet) 與視角平移 (TranslateX)
        function updateBookTransform() {
            // 判斷哪幾張物理紙張需要被翻轉
            const targetSheet = Math.floor((currentPage + 1) / 2);
            let didFlip = false;
            if (targetSheet !== lastFlippedSheet) {
                didFlip = true;
                lastFlippedSheet = targetSheet;
            }

            const sheets = document.querySelectorAll('.sheet');
            sheets.forEach((sheet, index) => {
                if (index < targetSheet) {
                    sheet.classList.add('flipped');
                    sheet.style.zIndex = index;
                } else {
                    sheet.classList.remove('flipped');
                    sheet.style.zIndex = totalSheets - index;
                }
            });

            // 計算動態視角追蹤
            const isMobile = window.innerWidth < 768;
            let translateX = 0;

            if (isMobile) {
                // 手機版：始終單頁滿版聚焦 (左平移/右平移)
                translateX = (currentPage % 2 === 0) ? -25 : 25;
            } else {
                // 電腦版：雙頁展開，除了封面與封底需置中
                if (currentPage === 0) {
                    translateX = -25; // 封面靠右，故向左平移置中
                } else if (currentPage === totalPages - 1) {
                    translateX = (totalPages % 2 === 0) ? 25 : -25;
                } else {
                    translateX = 0;
                }
            }

            // 確保套用正確的 scale 與 translation
            const bookEl = document.getElementById('book');
            bookEl.style.width = '1200px'; 
            bookEl.style.height = '800px'; 
            bookEl.style.transform = `scale(${currentScale}) translateX(${translateX}%)`;

            updateUI();
            if (didFlip) playFlipSound();
            localStorage.setItem('summitBookProgressPage', currentPage);
        }

        // 計算最佳縮放比例 (運用 transform scale，絕不壓縮排版！)
        function scaleBook() {
            const isMobile = window.innerWidth < 768;
            // 給予些許安全邊界
            const availableWidth = window.innerWidth * (isMobile ? 0.95 : 0.9);
            // 手機版只需要裝下"單頁"的寬度即可 (600px)，電腦版需要裝下雙頁 (1200px)
            const effectiveBookWidth = isMobile ? 600 : 1200; 
            const availableHeight = window.innerHeight - (isMobile ? 180 : 150);

            const scaleX = availableWidth / effectiveBookWidth;
            const scaleY = availableHeight / 800; // 書本固定高度 800px
            currentScale = Math.min(scaleX, scaleY);
            if (currentScale > 1) currentScale = 1;

            // 套用
            updateBookTransform();
        }

        // 動態生成目錄
        function buildTOC() {
            const tocNav = document.getElementById('toc-container');
            let tocHTML = '';
            
            bookData.forEach((page, index) => {
                if (page.title && page.type !== 'cover' && !page.isTOC) {
                    tocHTML += `
                        <button onclick="goToPage(${index}); toggleSidebar();" class="toc-item w-full text-left py-2 px-3 rounded hover:bg-slate-800 transition flex justify-between items-center group">
                            <span class="group-hover:text-summit-gold transition-colors text-base">${page.title}</span>
                            <span class="text-sm text-slate-500">P.${index}</span>
                        </button>
                    `;
                }
            });
            tocNav.innerHTML = tocHTML;

            const inBookTOC = document.getElementById('page-toc-content');
            if(inBookTOC) {
                let innerTOC = '<ul class="space-y-4">';
                bookData.forEach((page, index) => {
                    if (page.title && page.type !== 'cover' && !page.isTOC) {
                        innerTOC += `
                            <li class="flex justify-between items-center border-b border-slate-200 pb-3 cursor-pointer hover:text-summit-gold transition" onclick="goToPage(${index})">
                                <span class="font-bold text-lg">${page.title}</span>
                                <span class="text-slate-400">${index}</span>
                            </li>
                        `;
                    }
                });
                innerTOC += '</ul>';
                inBookTOC.innerHTML = innerTOC;
            }
        }

        function updateUI() {
            const percentage = Math.round((currentPage / (totalPages - 1)) * 100);
            document.getElementById('page-indicator').textContent = `閱讀進度: ${percentage}%`;
            document.getElementById('progress-slider').value = percentage;
        }

        // 搜尋功能
        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.toc-item');
            if(query.trim() !== '') {
                if(!document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
            }
            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                if (text.includes(query)) {
                    item.style.display = 'flex';
                    if(query.length > 0) {
                        const regex = new RegExp(`(${query})`, "gi");
                        item.querySelector('span').innerHTML = item.querySelector('span').textContent.replace(regex, "<span class='highlight'>$1</span>");
                    } else {
                        item.querySelector('span').innerHTML = item.querySelector('span').textContent;
                    }
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        // 模態框控制
        function handleTermClick(term) {
            if(knowledgeBase[term]) showModal(`名詞解釋：${term}`, `<p>${knowledgeBase[term]}</p>`);
        }
        function handleCaseClick(caseId) {
            if(caseStudies[caseId]) showModal(caseStudies[caseId].title, caseStudies[caseId].content);
        }
        function showModal(title, body) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').innerHTML = body;
            document.getElementById('modal-backdrop').classList.add('active');
        }
        function hideModal() { document.getElementById('modal-backdrop').classList.remove('active'); }
        function closeModal(e) { if (e.target.id === 'modal-backdrop') hideModal(); }

        // 音效控制
        let soundEnabled = true;
        const flipSound = document.getElementById('flip-sound');
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const icon = document.querySelector('#soundBtn i');
            icon.setAttribute('data-lucide', soundEnabled ? 'volume-2' : 'volume-x');
            lucide.createIcons();
        }
        function playFlipSound() {
            if (soundEnabled && flipSound) {
                flipSound.currentTime = 0;
                flipSound.volume = 0.3;
                flipSound.play().catch(e => {});
            }
        }

        // 啟動
        window.onload = () => {
            initBook();
        };
    </script>
</body>
</html>
